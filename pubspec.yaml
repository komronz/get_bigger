name: get_bigger
description: "Animal Merge 2048 - A cute animal evolution puzzle game."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_bloc: ^9.1.0
  bloc: ^9.0.0

  # Immutable models & code generation
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0

  # Dependency injection
  get_it: ^8.0.3

  # Utilities
  equatable: ^2.0.7
  shared_preferences: ^2.3.5
  dartz: ^0.10.1
  uuid: ^4.5.1

  cupertino_icons: ^1.0.8
  audioplayers: ^6.7.1
  easy_localization: ^3.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  build_runner: ^2.4.15
  freezed: ^2.5.8
  json_serializable: ^6.9.5
  flutter_launcher_icons: ^0.14.4

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/app_icon_2048.png"
  adaptive_icon_background: "#FFFFFF"


flutter:
  uses-material-design: true

  assets:
    - assets/sounds/click.wav
    - assets/translations/
